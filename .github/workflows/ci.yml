name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:   # ✅ ADD THIS
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Verify AWS Identity (DEBUG - KEEP THIS)
      run: aws sts get-caller-identity

    - name: Debug Variables (IMPORTANT)
      run: |
        echo "Region: $AWS_REGION"
        echo "Account: $AWS_ACCOUNT_ID"

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | \
        docker login --username AWS --password-stdin \
        $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

    - name: Build Docker Image
      run: |
        docker build -t devops-app:${{ github.sha }} .

    - name: Tag Image
      run: |
        docker tag devops-app:${{ github.sha }} \
        $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/devops-app:${{ github.sha }}

    - name: Push Image to ECR
      run: |
        docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/devops-app:${{ github.sha }}